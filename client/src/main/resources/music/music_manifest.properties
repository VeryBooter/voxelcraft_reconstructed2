# Voxelcraft music manifest (self-hosted runtime).
# Paths are classpath resources under client/src/main/resources.
# Recommended format: WAV, 48kHz.

# ==== Cue tracks (horizontal resequencing source lists) ====
# cue.<state>.paths = comma-separated resource paths
# cue.<state>.bpm   = integer bpm
# cue.<state>.meter = beats/timebase, only numerator is used for bar quantization

cue.menu.paths=
cue.menu.bpm=84
cue.menu.meter=4/4

cue.loading.paths=
cue.loading.bpm=90
cue.loading.meter=4/4

cue.explore_day.paths=
cue.explore_day.bpm=96
cue.explore_day.meter=6/8

cue.explore_night.paths=
cue.explore_night.bpm=72
cue.explore_night.meter=4/4

cue.town.paths=
cue.town.bpm=104
cue.town.meter=2/4

cue.cave.paths=
cue.cave.bpm=70
cue.cave.meter=3/4

cue.combat.paths=
cue.combat.bpm=140
cue.combat.meter=4/4

cue.boss.paths=
cue.boss.bpm=132
cue.boss.meter=12/8

cue.victory.paths=
cue.victory.bpm=120
cue.victory.meter=4/4

cue.defeat.paths=
cue.defeat.bpm=60
cue.defeat.meter=4/4

cue.wormhole.paths=
cue.wormhole.bpm=84
cue.wormhole.meter=4/4

